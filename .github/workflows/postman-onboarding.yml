# Postman API onboarding: Loan Origination Service
# Same pattern as payment-refund; service-specific inputs (domain, envs, spec-url).
# Trigger manually from Actions tab. Ensure POSTMAN_API_KEY and POSTMAN_ACCESS_TOKEN are set as repo secrets.
# Runs from repo root (this repo is the service).

name: Postman onboarding (loan-origination)

on:
  workflow_dispatch:

jobs:
  onboarding:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      variables: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Postman API onboarding
        uses: postman-cs/postman-api-onboarding-action@v0
        with:
          project-name: loan-origination-api
          domain: lending
          domain-code: LN
          spec-url: https://raw.githubusercontent.com/tsailifehighlights/loan-origination-service/main/specs/loan-origination-api-openapi.yaml
          environments-json: '["prod","staging","dev"]'
          env-runtime-urls-json: '{"prod":"https://lending-api.example.com/v1","staging":"https://lending-api-staging.example.com/v1","dev":"https://lending-api-dev.example.com/v1"}'
          governance-mapping-json: '{"lending":"Lending"}'
          system-env-map-json: '{}'
          generate-ci-workflow: true
          ci-workflow-path: .github/workflows/ci.yml
          repo-write-mode: commit-and-push
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-fallback-token: ${{ secrets.GH_FALLBACK_TOKEN }}
